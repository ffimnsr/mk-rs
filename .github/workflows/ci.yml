# Reference from here:
# https://github.com/dtolnay/syn/blob/master/.github/workflows/ci.yml
name: ci
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '00 01 * * *'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check-pass:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustc-dev
      - name: Run cargo check tool
        run: cargo check --all-targets --all-features --tests --benches --release --verbose
  test:
    runs-on: ${{ matrix.os }}
    needs:
      - check-pass
    env:
      CARGO: cargo
      TARGET_FLAGS: ""
      TARGET_DIR: ./target
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: stable
            os: ubuntu-latest
            rust: stable
          - build: beta
            os: ubuntu-latest
            rust: beta
          - build: nightly
            os: ubuntu-latest
            rust: nightly
          - build: stable-musl
            os: ubuntu-latest
            rust: stable
            target: x86_64-unknown-linux-musl
          - build: stable-x86
            os: ubuntu-latest
            rust: stable
            target: i686-unknown-linux-gnu
          - build: stable-aarch64
            os: ubuntu-latest
            rust: stable
            target: aarch64-unknown-linux-gnu
          - build: stable-powerpc64
            os: ubuntu-latest
            rust: stable
            target: powerpc64-unknown-linux-gnu
          - build: stable-s390x
            os: ubuntu-latest
            rust: stable
            target: s390x-unknown-linux-gnu
          - build: macos
            os: macos-latest
            rust: stable
          - build: win-msvc
            os: windows-latest
            rust: nightly
            target: x86_64-pc-windows-msvc
          - build: win-gnu
            os: windows-latest
            rust: nightly-x86_64-gnu
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install packages (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ci/ubuntu-install-packages
      - name: Install packages (Windows GNU)
        uses: msys2/setup-msys2@v2.31.0
        if: matrix.os == 'windows-latest' && matrix.target == 'x86_64-pc-windows-gnu'
        with:
          msystem: UCRT64
          update: false
          install: git perl pkg-config mingw-w64-x86_64-toolchain mingw-w64-ucrt-x86_64-gcc openssl
          path-type: inherit
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools, rustc-dev
      - name: Set up QEMU
        if: matrix.os == 'ubuntu-latest' && matrix.target != ''
        uses: docker/setup-qemu-action@v4
      - name: Install cross
        if: matrix.os == 'ubuntu-latest' && matrix.target != ''
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Set cross environment
        if: matrix.os == 'ubuntu-latest' && matrix.target != ''
        shell: bash
        run: |
          echo "CARGO=cross" >> $GITHUB_ENV
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV
      - name: Show command used for Cargo
        run: |
          echo "cargo command is: ${{ env.CARGO }}"
          echo "target flag is: ${{ env.TARGET_FLAGS }}"
          echo "target dir is: ${{ env.TARGET_DIR }}"
      - name: Build binary
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: ${{ env.CARGO }} build --verbose ${{ env.TARGET_FLAGS }}
      - name: Build binary (win-gnu)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: ${{ env.CARGO }} build --verbose ${{ env.TARGET_FLAGS }}
      - name: Run tests
        if: matrix.target != 'x86_64-pc-windows-gnu' && (matrix.os != 'ubuntu-latest' || matrix.target == '')
        run: ${{ env.CARGO }} test --verbose ${{ env.TARGET_FLAGS }}
      - name: Run tests (cross)
        if: matrix.os == 'ubuntu-latest' && matrix.target != ''
        run: ${{ env.CARGO }} test --verbose ${{ env.TARGET_FLAGS }}
      - name: Run tests (win-gnu)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        shell: msys2 {0}
        run: ${{ env.CARGO }} test --verbose ${{ env.TARGET_FLAGS }}
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustc-dev
      - run: cargo clippy --all-features --all-targets --tests --benches -- -Dclippy::all
